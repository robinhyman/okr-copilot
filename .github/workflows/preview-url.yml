name: Preview URL

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  announce-preview-url:
    name: Preview URL hint
    runs-on: ubuntu-latest
    steps:
      - name: Compute expected preview URL
        id: preview
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          URL="https://okr-copilot-pr-${PR_NUMBER}.onrender.com"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- okr-copilot-preview-url -->';
            const body = `${marker}
            🔍 Render preview (expected URL after deploy):
            ${{ steps.preview.outputs.url }}

            Notes:
            - Deploy is triggered by Render on every PR update.
            - First deploy can take a few minutes.
            - If this URL is not live yet, check Render deploy logs for this PR.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Add preview URL to job summary
        run: |
          echo "### Expected preview URL" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.preview.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
