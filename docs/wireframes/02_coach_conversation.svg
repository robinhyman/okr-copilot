  <text x="950" y="205" font-family="Arial" font-size="17" fill="#374151">Area: EMEA onboarding conversion</text>
  <text x="950" y="236" font-family="Arial" font-size="17" fill="#374151">Baseline: 14%</text>
  <text x="950" y="267" font-family="Arial" font-size="17" fill="#374151">Timeframe: Q3</text>
  <text x="950" y="298" font-family="Arial" font-size="17" fill="#374151">Constraints: No extra headcount</text>
  <text x="950" y="329" font-family="Arial" font-size="17" fill="#374151">Quality bar maintained</text>

  <rect x="950" y="730" width="360" height="56" rx="8" fill="#10b981"/>
